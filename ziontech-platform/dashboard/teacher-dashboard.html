<html>
<head>
    <title>Teacher Dashboard - TechEdu</title>

</head>
<body>

<header>
    <h2>Teacher Dashboard</h2>
    <button onclick="logout()">Logout</button>
</header>

<div class="dashboard">

    <h3>Upload Lesson Note</h3>
    <input type="text" id="subject" placeholder="Subject Name">
    <textarea id="lesson" placeholder="Write lesson note here"></textarea>
    <button onclick="uploadLesson()">Upload Lesson</button>

    <h3>Upload PDF</h3>
    <input type="file" id="pdfFile">
    <button onclick="uploadPDF()">Upload PDF</button>

</div>

</body>
