<section>
    <h2>Contact Us</h2>
    <p>If you have any questions or need support, you can reach ZionTech using the form below or through our contact details.</p>

    <form id="contact-form">
        <label for="name">Full Name:</label><br>
        <input type="text" id="name" placeholder="ADEYEMO OLANREWAJU DAVID"><br><br>

        <label for="email">Email Address:</label><br>
        <input type="email" id="email" placeholder="olanrewajuadeyemo25@gmail.com"><br><br>

        <label for="message">Message:</label><br>
        <textarea id="message" rows="5" placeholder="Write your message here"></textarea><br><br>

        <button type="button" onclick="submitContact()">Send Message</button>
    </form>

    <h3 id="contact-response"></h3>
</section>

<script>
function submitContact() {
    let name = document.getElementById("name").value;
    let email = document.getElementById("email").value;
    let message = document.getElementById("message").value;

    if(name && email && message){
        document.getElementById("contact-response").innerHTML = 
            "Thank you, " + name + ". Your message has been sent successfully!";
        // Here you can integrate backend/email service
    } else {
        document.getElementById("contact-response").innerHTML = 
            "Please fill in all fields before submitting.";
    }
}
</script>
