<section>
    <h2>Admin Login</h2>

    <form id="admin-login-form">
        <label for="admin-id">Admin ID:</label><br>
        <input type="text" id="admin-id" placeholder="Enter Admin ID"><br><br>

        <label for="password">Password:</label><br>
        <input type="password" id="admin-password" placeholder="Enter Password"><br><br>

        <button type="button" onclick="adminLogin()">Login</button>
    </form>

    <h3 id="login-response"></h3>
</section>

<script>
// Simple Admin Login
function adminLogin() {
    const adminId = document.getElementById("admin-id").value;
    const password = document.getElementById("admin-password").value;

    // Hardcoded example (replace with database/auth later)
    if(adminId === "ADMIN01" && password === "ziontech2026") {
        document.getElementById("login-response").innerHTML = 
            "Login successful! Redirecting to Admin Dashboard...";
        // Redirect to admin dashboard
        setTimeout(() => {
            window.location.href = "../dashboards/admin-dashboard.html";
        }, 1500);
    } else {
        document.getElementById("login-response").innerHTML = 
            "Invalid Admin ID or Password. Please try again.";
    }
}
</script>
